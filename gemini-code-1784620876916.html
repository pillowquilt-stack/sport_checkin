<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人类丰荣计划 - 运动打卡</title>
    <style>
        :root {
            --bg-color: #fcf8f2;
            --card-bg: #fffdf9;
            --text-main: #5c4033;
            --border-color: #e6d5c3;
            --accent-color: #d4a373;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(92, 64, 51, 0.08);
            width: 700px;
            padding: 30px;
            box-sizing: border-box;
        }

        /* 标题部分 */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 24px;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
        }
        .header p {
            font-size: 14px;
            color: #8c7365;
            margin: 0;
        }

        /* 月份切换 */
        .month-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }
        .month-nav button {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .month-nav button:hover {
            background-color: var(--accent-color);
            color: #fff;
        }

        /* 星期表头 */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: bold;
            color: #a68a7b;
            margin-bottom: 10px;
            font-size: 14px;
        }

        /* 日历网格 */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .day-cell {
            aspect-ratio: 1;
            background: rgba(230, 213, 195, 0.15);
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            border: 2px dashed transparent;
        }

        .day-cell:hover {
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .day-cell.empty {
            background: transparent;
            cursor: default;
            border: none;
        }
        .day-cell.empty:hover {
            transform: none;
        }

        /* 日期数字在右上角 */
        .day-number {
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #7f6354;
            z-index: 2;
        }

        /* 印章中心内容样式 */
        .stamp-content {
            font-size: 11px;
            text-align: center;
            color: #5c4033;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .stamp-content span {
            font-size: 20px; /* 图标/emoji大小 */
        }

        /* 底部统计面板 */
        .stats-panel {
            background: rgba(230, 213, 195, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .stat-item .num {
            font-size: 18px;
            font-weight: bold;
            color: #b5651d;
        }
        .stat-item .label {
            font-size: 12px;
            color: #8c7365;
            margin-top: 4px;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            width: 350px;
            text-align: center;
        }
        .modal-content h3 { margin-top: 0; margin-bottom: 15px;}
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .option-btn {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-main);
            transition: 0.2s;
        }
        .option-btn:hover {
            background: var(--accent-color);
            color: #fff;
        }
        .close-modal {
            background: #ccc;
            border: none;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>「人类丰荣计划」</h1>
        <p>/ 备战奥运</p>
    </div>

    <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <span id="currentMonthYear">July 2026</span>
        <button onclick="changeMonth(1)">›</button>
    </div>

    <div class="weekdays">
        <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
        <!-- 动态生成日历格子 -->
    </div>

    <!-- 底部统计 -->
    <div class="stats-panel" id="statsPanel">
        <!-- 动态生成统计 -->
    </div>
</div>

<!-- 选择运动弹窗 -->
<div class="modal" id="actionModal">
    <div class="modal-content">
        <h3>选择今日运动打卡</h3>
        <div class="options-grid" id="optionsGrid">
            <!-- 运动选项 -->
        </div>
        <button class="close-modal" onclick="closeModal()">取消 / 清除</button>
    </div>
</div>

<script>
    // 定义运动类型及其图标 (可对应替换成图2的可爱猫咪图片)
    const sportTypes = {
        'run': { name: '跑步', icon: '🏃' },
        'dance': { name: '跳舞', icon: '💃' },
        'badminton': { name: '羽毛球', icon: '🏸' },
        'fitness': { name: '健身', icon: '💪' },
        'yoga': { name: '瑜伽', icon: '🧘' },
        'walk': { name: '散步', icon: '🐾' },
        'bike': { name: '骑车', icon: '🚴' },
        'swim': { name: '游泳', icon: '🏊' },
        'stretch': { name: '拉伸', icon: '🐈' },
        'rest': { name: '休息', icon: '☕' }
    };

    let currentDate = new Date(2026, 6, 1); // 默认 2026年7月
    let checkIns = {}; // 存储打卡数据，格式: "2026-7-21": "run"
    let selectedDayKey = null;

    function initCalendar() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        // 设置顶部年月显示
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        document.getElementById('currentMonthYear').innerText = `${monthNames[month]} ${year}`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        // 获取当月第一天是星期几 (调整周一为一周的第一天)
        let firstDayIndex = new Date(year, month, 1).getDay();
        firstDayIndex = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 

        // 获取当月总天数
        const totalDays = new Date(year, month + 1, 0).getDate();

        // 填充空白前置格子
        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            grid.appendChild(emptyCell);
        }

        // 填充日期格子
        for (let day = 1; day <= totalDays; day++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const dateKey = `${year}-${month}-${day}`;
            
            // 右上角日期数字
            const numSpan = document.createElement('span');
            numSpan.className = 'day-number';
            numSpan.innerText = day;
            cell.appendChild(numSpan);

            // 如果这天有打卡记录，渲染中心印章
            if (checkIns[dateKey]) {
                const sport = sportTypes[checkIns[dateKey]];
                const stampDiv = document.createElement('div');
                stampDiv.className = 'stamp-content';
                stampDiv.innerHTML = `<span>${sport.icon}</span>`;
                cell.appendChild(stampDiv);
                
                // 简单的背景区分色（可以根据类别自定义）
                cell.style.background = 'rgba(212, 163, 115, 0.25)';
            }

            // 点击弹出打卡选择
            cell.onclick = () => openModal(dateKey);
            grid.appendChild(cell);
        }

        updateStats(year, month, totalDays);
    }

    function changeMonth(direction) {
        currentDate.setMonth(currentDate.getMonth() + direction);
        initCalendar();
    }

    function openModal(dateKey) {
        selectedDayKey = dateKey;
        const modal = document.getElementById('actionModal');
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';

        for (let key in sportTypes) {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `${sportTypes[key].icon} <br>${sportTypes[key].name}`;
            btn.onclick = () => selectSport(key);
            grid.appendChild(btn);
        }
        modal.style.display = 'flex';
    }

    function selectSport(sportKey) {
        if (selectedDayKey) {
            checkIns[selectedDayKey] = sportKey;
        }
        closeModal();
        initCalendar();
    }

    function closeModal() {
        document.getElementById('actionModal').style.display = 'none';
        // 如果想在点击取消时清除打卡，可以在这里处理，目前点击取消仅关闭弹窗
    }

    function updateStats(year, month, totalDays) {
        let activeDays = 0;
        let totalCount = 0;
        let counts = {};

        for (let key in sportTypes) counts[key] = 0;

        for (let day = 1; day <= totalDays; day++) {
            const dateKey = `${year}-${month}-${day}`;
            if (checkIns[dateKey]) {
                activeDays++;
                totalCount++;
                counts[checkIns[dateKey]]++;
            }
        }

        const statsPanel = document.getElementById('statsPanel');
        statsPanel.innerHTML = `
            <div class="stat-item"><div class="num">${activeDays}</div><div class="label">运动天数</div></div>
            <div class="stat-item"><div class="num">${totalCount}</div><div class="label">打卡次数</div></div>
            <div class="stat-item"><div class="num">${counts['run']}</div><div class="label">跑步</div></div>
            <div class="stat-item"><div class="num">${counts['dance']}</div><div class="label">舞蹈</div></div>
            <div class="stat-item"><div class="num">${counts['badminton']}</div><div class="label">羽毛球</div></div>
            <div class="stat-item"><div class="num">${counts['rest']}</div><div class="label">休息</div></div>
        `;
    }

    // 初始化运行
    initCalendar();
</script>

</body>
</html>
